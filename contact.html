here<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Student Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This ensures inputs don't spill over the edges */
        input, textarea {
            box-sizing: border-box; 
            outline: none;
            transition: 0.3s;
            border: 1px solid transparent !important;
        }
        /* A nice glow when you click to type */
        input:focus, textarea:focus {
            border: 1px solid #4facfe !important;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align: center; margin-top: 40px; color: white;">Contact Me</h1>

    <div class="card" style="margin-top: 20px; padding: 25px; border-radius: 20px;">
        <h3 style="margin-top: 0;">Send an Email ✉️</h3>
        <p style="font-size: 0.9em; color: #cbd5e1; margin-bottom: 20px;">
            I'll get back to you as soon as possible.
        </p>

        <form action="https://api.web3forms.com/submit" method="POST" style="display: flex; flex-direction: column; gap: 18px;">
            <input type="hidden" name="access_key" value="f31b7e84-709d-46a7-b455-ccd2e5cfdd83">

            <input type="text" name="name" placeholder="Full Name" required 
                   style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1e293b; color: white; font-size: 16px;">
            
            <input type="email" name="email" placeholder="Email Address" required 
                   style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1e293b; color: white; font-size: 16px;">

            <textarea name="message" placeholder="Type your message here..." rows="5" required 
                      style="width: 100%; padding: 14px; border-radius: 12px; border: none; background: #1e293b; color: white; font-size: 16px; resize: none;"></textarea>

            <button type="submit" class="btn" style="width: 100%; padding: 15px; font-weight: bold; margin-top: 5px;">
                Submit Email
            </button>
        </form>
    </div>

    <div class="card" style="margin-top: 25px; text-align: center; padding: 25px; border-radius: 20px;">
        <h3 style="margin-top: 0;">Direct Chat 💬</h3>
        <p style="font-size: 0.9em; color: #cbd5e1; margin-bottom: 20px;">
            Want to chat right now? Message me on WhatsApp.
        </p>
        
        <a href="https://wa.me/2349077624744" class="btn" style="text-decoration: none; display: block; padding: 15px; font-weight: bold;">
            Chat on WhatsApp 📲
        </a>
    </div>

    <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
        <a href="index.html" style="color: #4facfe; text-decoration: none; font-weight: 500;">← Back to Home</a>
    </div>
</div>

</body>
</html>
