<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Student Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* This ensures the page has that deep dark blue background */
        body {
            background-color: #0f172a;
            color: white;
            margin: 0;
            font-family: sans-serif;
        }

        /* Fixing the "Invisible" boxes */
        .contact-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input, textarea {
            box-sizing: border-box; 
            outline: none;
            border: 1px solid transparent !important;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: #0f172a; /* Darker input background */
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }

        input:focus, textarea:focus {
            border: 1px solid #4facfe !important;
        }
    </style>
</head>
<body>

<div class="container" style="padding: 20px;">
    <h1 style="text-align: center; margin-top: 40px; color: #4facfe; text-shadow: 0 0 10px rgba(79, 172, 254, 0.5);">
        Contact Me
    </h1>

    <div class="contact-card">
        <h3 style="margin-top: 0; color: white;">Send an Email ✉️</h3>
        <p style="font-size: 0.9em; color: #cbd5e1; margin-bottom: 20px;">
            I'll get back to you as soon as possible.
        </p>

        <form action="https://api.web3forms.com/submit" method="POST" style="display: flex; flex-direction: column;">
            <input type="hidden" name="access_key" value="f31b7e84-709d-46a7-b455-ccd2e5cfdd83">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Type your message here..." rows="5" required style="resize: none;"></textarea>

            <button type="submit" class="btn" style="width: 100%; padding: 15px; font-weight: bold; margin-top: 5px; cursor: pointer;">
                Submit Email
            </button>
        </form>
    </div>

    <div class="contact-card" style="text-align: center;">
        <h3 style="margin-top: 0; color: white;">Direct Chat 💬</h3>
        <p style="font-size: 0.9em; color: #cbd5e1; margin-bottom: 20px;">
            Want to chat right now? Message me on WhatsApp.
        </p>
        
        <a href="https://wa.me/2349077624744" class="btn" style="text-decoration: none; display: block; padding: 15px; font-weight: bold;">
            Chat on WhatsApp 📲
        </a>
    </div>

    <div style="text-align: center; margin-top: 40px; padding-bottom: 40px;">
        <a href="index.html" style="color: #4facfe; text-decoration: none; font-weight: 500;">← Back to Home</a>
    </div>
</div>

</body>
</html>
