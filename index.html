<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U2025</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4facfe">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="menu-btn" onclick="toggleMenu()" role="button" aria-label="Open Menu">☰</div>
    <h2>U2025</h2>
    <div class="theme-btn" onclick="toggleTheme()" role="button" aria-label="Toggle Theme">🌙</div>
</header>

<nav id="sidebar">
    <a href="#">Home</a>
    <a href="#">Bible Study</a>
    <a href="#">Study Resources</a>
    <a href="#">Quiz</a>
    <a href="#">Contact</a>
</nav>

<div id="overlay" onclick="toggleMenu()"></div>

<section class="hero">
    <h1>Welcome 👋</h1>
    <p>Helping students grow spiritually and academically</p>

    <button>Start Learning</button>

    <button id="installBtn" style="display:none;">
        Install App 📲
    </button>
</section>

<script src="script.js"></script>

<script>
    if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('Service Worker Registered!', reg))
      .catch(err => console.log('Service Worker Failed!', err));
  });
    }
</script>

</body>
</html>
