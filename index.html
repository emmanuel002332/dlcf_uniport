<nav id="sidebar">

    <a href="quiz.html">Quiz</a>

<div id="overlay" onclick="toggleMenu()"></div>

<section class="hero">
    <h1>Welcome 👋</h1>
    <p>Helping students grow academically</p>

    <button>Start Learning</button>

    <button id="installBtn" style="display:none;">
        Install App 📲
    </button>
</section>

    <a style="background: linear-gradient(135deg, #4f46e5, #3b82f6);
          text-decoration: none;
          color: white;
          padding: 10px;
          margin: 100px;
          border-radius: 40px;"href="course_outline.html" class="one">COURSE OUTLINE</a>

<section style="padding: 0 20px;">
    <div style="
        background: #1e293b; 
        padding: 25px; 
        border-radius: 20px; 
        margin: 20px auto; 
        max-width: 500px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;">

        <h3 style="color: white; margin-top: 0; font-family: sans-serif;">Quick Search 🔍</h3>
        <p style="font-size: 0.85em; color: #cbd5e1; margin-bottom: 20px; font-family: sans-serif;">
            Find notes or academic answers instantly.
        </p>

        <form action="https://www.google.com/search" method="GET" target="_blank" style="display: flex; flex-direction: column; gap: 15px;">
            
            <input type="text" name="q" placeholder="What are you looking for?" required 
                style="
                    width: 100%; 
                    padding: 14px; 
                    border-radius: 12px; 
                    border: 1px solid transparent; 
                    background: #0f172a; 
                    color: white; 
                    font-size: 16px; 
                    box-sizing: border-box;
                    outline: none;
                    transition: 0.3s;"
                onfocus="this.style.border='1px solid #4facfe'" 
                onblur="this.style.border='1px solid transparent'">

            <button type="submit" class="btn" style="
                width: 100%; 
                padding: 15px; 
                font-weight: bold; 
                cursor: pointer; 
                border: none;
                border-radius: 12px;
                color: white;
                background: linear-gradient(45deg, #4facfe, #00f2fe);">
                Search Google
            </button>
        </form>
    </div>
</section>
<script src="script.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("Course App Ready!"));
  }
</script>

</body>
</html>
